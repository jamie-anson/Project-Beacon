name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for proper commit info
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          portal/package-lock.json
    
    - name: Install root dependencies
      run: npm ci
    
    - name: Install portal dependencies
      run: |
        cd portal
        npm ci
    
    - name: Run linting
      run: |
        npm run lint || echo "Linting not configured, skipping"
        cd portal && (npm run lint || echo "Portal linting not configured, skipping")
    
    - name: Run tests
      run: |
        npm test || echo "Tests not configured, skipping"
        cd portal && (npm test || echo "Portal tests not configured, skipping")
    
    - name: Build static site
      run: npm run build:static
    
    - name: Build docs
      run: npm run build:docs
    
    - name: Generate docs CID
      run: npm run postbuild:cid
    
    - name: Build docs with CID
      run: |
        DOCS_BUILD_CID=$(cat dist/docs-cid.txt)
        echo "Generated docs CID: $DOCS_BUILD_CID"
        DOCS_BUILD_CID="$DOCS_BUILD_CID" npm run build:docs:with-cid
    
    - name: Build portal
      run: |
        DOCS_BUILD_CID=$(cat dist/docs-cid.txt)
        BUILD_COMMIT=$(git rev-parse --short HEAD)
        echo "Building portal with CID: $DOCS_BUILD_CID, Commit: $BUILD_COMMIT"
        cd portal
        VITE_DOCS_CID="$DOCS_BUILD_CID" VITE_BUILD_COMMIT="$BUILD_COMMIT" npm run build
    
    - name: Assemble final build
      run: |
        mkdir -p dist/portal
        cp -R portal/dist/* dist/portal/
        echo "Build complete. Contents of dist/:"
        ls -la dist/
    
    - name: Validate build artifacts
      run: |
        # Ensure critical files exist
        test -f dist/index.html || (echo "Missing dist/index.html" && exit 1)
        test -d dist/docs || (echo "Missing dist/docs directory" && exit 1)
        test -d dist/portal || (echo "Missing dist/portal directory" && exit 1)
        test -f dist/docs-cid.txt || (echo "Missing dist/docs-cid.txt" && exit 1)
        
        # Validate portal build
        test -f dist/portal/index.html || (echo "Missing portal index.html" && exit 1)
        
        # Check CID was generated
        CID=$(cat dist/docs-cid.txt)
        echo "Generated CID: $CID"
        [[ $CID =~ ^bafy[a-z0-9]{56}$ ]] || (echo "Invalid CID format: $CID" && exit 1)
        
        echo "✅ All build artifacts validated successfully"
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ github.sha }}
        path: dist/
        retention-days: 30
    
    - name: Upload build info
      uses: actions/upload-artifact@v4
      with:
        name: build-info-${{ github.sha }}
        path: |
          dist/docs-cid.txt
          package.json
          portal/package.json
        retention-days: 7

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm ci
        cd portal && npm ci
    
    - name: Run security audit
      run: |
        echo "🔍 Running npm audit for root dependencies"
        npm audit --audit-level=high || echo "Security issues found in root dependencies"
        
        echo "🔍 Running npm audit for portal dependencies"
        cd portal
        npm audit --audit-level=high || echo "Security issues found in portal dependencies"
    
    - name: Check for secrets
      run: |
        echo "🔍 Scanning for potential secrets"
        # Basic secret detection
        if grep -r -i "api[_-]key\|secret\|password\|token" --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" --include="*.json" . | grep -v node_modules | grep -v ".git" | grep -v "package-lock.json"; then
          echo "⚠️  Potential secrets found in code"
          exit 1
        else
          echo "✅ No obvious secrets detected"
        fi
    
    - name: Validate netlify.toml
      run: |
        if [ -f netlify.toml ]; then
          echo "✅ netlify.toml found"
          # Basic validation
          grep -q "publish = \"dist\"" netlify.toml || (echo "❌ netlify.toml missing publish directory" && exit 1)
          grep -q "X-Frame-Options" netlify.toml || echo "⚠️  Consider adding X-Frame-Options header"
          grep -q "X-Content-Type-Options" netlify.toml || echo "⚠️  Consider adding X-Content-Type-Options header"
          echo "✅ netlify.toml basic validation passed"
        else
          echo "❌ netlify.toml not found"
          exit 1
        fi

  build-summary:
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: always()
    steps:
    - name: Build Summary
      run: |
        echo "## 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ needs.build-and-test.result }}" == "success" ]; then
          echo "✅ **Build & Test:** Passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Build & Test:** Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.security-scan.result }}" == "success" ]; then
          echo "✅ **Security Scan:** Passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Security Scan:** Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
        if [ "${{ github.ref_name }}" == "main" ] && [ "${{ needs.build-and-test.result }}" == "success" ]; then
          echo "- 🚀 Production deployment will trigger automatically" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ github.event_name }}" == "pull_request" ] && [ "${{ needs.build-and-test.result }}" == "success" ]; then
          echo "- 🔍 PR preview deployment will be created" >> $GITHUB_STEP_SUMMARY
        fi

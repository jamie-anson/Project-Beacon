# Fly.io app config for Project Beacon Runner
# Replace the app name below, or let `flyctl launch` generate one and update this file.
app = "beacon-runner-change-me"

primary_region = "lhr" # choose nearest: lhr/iad/fra/sjc/...

[build]
  dockerfile = "Dockerfile"

[env]
  HTTP_PORT = ":8090"
  JOBS_QUEUE_NAME = "jobs"

[[services]]
  processes = ["app"]
  internal_port = 8090
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    soft_limit = 100
    hard_limit = 200

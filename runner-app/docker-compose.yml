version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: beacon_runner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "4002:4001"     # P2P swarm (avoid conflict)
      - "5001:5001"     # API
      - "8081:8080"     # Gateway (avoid conflict with runner)
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 30s
      timeout: 10s
      retries: 3

  runner:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:password@postgres:5432/beacon_runner?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - IPFS_API_URL=http://ipfs:5001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    volumes:
      - ./:/app
    working_dir: /app
    command: go run cmd/runner/main.go

volumes:
  postgres_data:
  redis_data:
  ipfs_data:
